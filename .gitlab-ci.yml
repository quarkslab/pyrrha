build_image:
  stage: build
  image: docker:cli
  services:
    - docker:dind
  parallel:
    matrix:
      - BACKEND: "ida"
        VERSION: [91, 93]
        LATEST: 93 
      - BACKEND: "ghidra"
        VERSION: ["12.0.4"]
        LATEST: "12.0.4"
  variables:
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE/pyrrha-$BACKEND
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build --pull -t "$DOCKER_IMAGE_NAME:$VERSION" ci/pyrrha/Dockerfile --build-arg DISASS_IMAGE=$CI_REGISTRY_IMAGE/ci/${BACKEND} --build-arg DISASS_IMAGE_VERSION=$VERSION
    - docker push "$DOCKER_IMAGE_NAME:$VERSION"
    - |
      if [[ "$VERSION" == "$LATEST" ]]; then
        docker tag "$DOCKER_IMAGE_NAME:$VERSION" "$DOCKER_IMAGE_NAME:latest"
        docker push "$DOCKER_IMAGE_NAME:latest"
      fi


#========================== OBJECTS TESTS ====================================

test_data_structures: 
  stage: test
  before_script: 
    - echo -e "\e[95m===== Install Pyrrha with test extension"
    - pip install '.[test]'
  script:
    - echo -e "\e[95m===== Tests"
    - coverage run --source=${TEST_COVERAGE_SOURCE} -m pytest  --junitxml=report.xml -vvv -x ${TEST_SUP_OPTIONS} ${TEST_PATH}
    - coverage xml
    - coverage report
  image: python:latest
  variables:
    TEST_COVERAGE_SOURCE: pyrrha_mapper.common.objects
    TEST_PATH: tests/test_filesystem_objects.py
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

#========================== MAPPERS TESTS ====================================
test_fs: 
  extends:
  - test_data_structures
  artifacts:
    name: db_$CI_JOB_NAME_SLUG
    paths:
      - test_artifacts/
    when: always
  variables:
    DB: fs
    MAPPER: fs
    TEST_COVERAGE_SOURCE: pyrrha_mapper.common.filesystem_mapper,pyrrha_mapper.fs
    TEST_PATH: tests/test_cli.py::TestFSMapper
    PYTEST_ARTIFACTS_DIR: test_artifacts
    

test_fs-cg:
  extends: 
    - test_fs
  image: 
    name: $CONTAINER_PATH/${BACKEND}:${VERSION}
    docker:
      user: user
  variables:
    DB: ${BACKEND}_${VERSION}
    MAPPER: fs-cg
    MAPPER_OPTIONS: '--backend ${BACKEND}'
    TEST_COVERAGE_SOURCE: pyrrha_mapper.common.filesystem_mapper,pyrrha_mapper.intercg
    TEST_PATH: tests/test_cli.py::TestFsCgMapper
    TEST_SUP_OPTIONS: ${MAPPER_OPTIONS}
    HEXRAYS_LICENSE: "${IDA_LICENSE}"
  parallel:
    matrix:
      - BACKEND: "ida"
        VERSION: [91, 93]
      - BACKEND: "ghidra"
        VERSION: ["12.0.4"]

