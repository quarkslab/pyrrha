[project]
site_name = "Pyrrha Documentation"
site_description = "A mapper collection for firmware analysis."
site_url = "https://quarkslab.github.io/pyrrha/"
site_author = "Quarkslab"
repo_url = "https://github.com/quarkslab/pyrrha"
repo_name = "quarkslab/pyrrha"
copyright = "Copyright &copy; 2023-2026 Quarkslab"

# --- Navigation -----------------------------------------------------------

nav = [
    { "Home" = "index.md" },
    { "Installation" = "installation.md" },
    { "Mappers" = [
        "mappers/index.md",
        { "Filesystem (Overview)" = "mappers/fs.md" },
        { "Filesystem (CallGraph)" = "mappers/fs-cg.md" },
        { "Decompilation Graph" = "mappers/exe-decomp.md" },
    ] },
    { "Contributing" = [
        { "Mapper Development" = "contributing/dev_mapper.md" },
    ] },
    { "Changelog" = "changelog.md" },
    { "License" = "license.md" },
]

# --- Theme ----------------------------------------------------------------
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "red"
accent = "red"

[project.theme.palette.toggle]
icon = "material/weather-sunny"
name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "red"
accent = "red"

[project.theme.palette.toggle]
icon = "material/weather-night"
name = "Switch to light mode"



features = [
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
]
[project.theme.icon.admonition]
note = "octicons/file-code-24"
[project.theme]
# --- Plugins --------------------------------------------------------------
# search and section-index behavior are built in / configured differently
# in Zensical. autorefs, glightbox, and social are MkDocs plugins; carry
# them over only if/when Zensical equivalents exist. Listing kept for parity.
plugins = ["autorefs", "glightbox", "search", "section-index", "social"]

# --- Markdown extensions --------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions."pymdownx.snippets"]
base_path = ["README.md", "LICENSE", "CHANGELOG.md", "docs/.snippets/"]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

[[project.extra.social]]
icon = "fontawesome/solid/globe"
link = "https://www.quarkslab.com"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/quarkslab"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://twitter.com/quarkslab"

[project.extra.version]
provider = "mike"